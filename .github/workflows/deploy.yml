name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static prerender)
        run: npx ng build --configuration staging --base-href /imd/

      - name: Block crawlers (staging only)
        run: |
          echo "User-agent: *" > dist/imd-college/browser/robots.txt
          echo "Disallow: /" >> dist/imd-college/browser/robots.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/imd-college/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
