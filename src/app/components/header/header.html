<header class="header">
  <div class="container header__row">
    <div class="header__brand">
      <img class="header__logo" [src]="brand.logoSrc" [alt]="brand.logoAlt" />
    </div>
    <h1 class="header__title display">
      <span>{{ brand.title }}</span>
      <span>{{ brand.titleLine2 }}</span>
    </h1>
  </div>
</header>
